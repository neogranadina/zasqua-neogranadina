# Secrets preflight — verify the deploy credentials without a build.
#
# Runs deploy/check-secrets.py, which probes each of the seven deploy
# secrets with a cheap, read-only call (B2 authorize, R2 bucket reach,
# Cloudflare token verify + zone read) and fails the run if any is wrong.
# Use it before a real deploy to catch a mistyped or missing secret in
# under a minute instead of partway through a full build.
#
# No secret value is ever printed; the script reports only PASS/FAIL.
# Runs on the cheap ubuntu-latest runner — there is no build here.
#
# Version: v1.1.0

name: Check deploy secrets

on:
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install probe dependencies
        run: pip install --quiet b2sdk boto3

      - name: Probe deploy credentials
        env:
          B2_APPLICATION_KEY_ID: ${{ secrets.B2_APPLICATION_KEY_ID }}
          B2_APPLICATION_KEY: ${{ secrets.B2_APPLICATION_KEY }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CF_ZONE_ID: ${{ secrets.CF_ZONE_ID }}
        run: python3 deploy/check-secrets.py

# Version: v1.1.0
